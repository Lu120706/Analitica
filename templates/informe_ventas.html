{% extends "base.html" %}

{% block title %}Ventas{% endblock %}

{% block content %}

<h3 class="text-center">Informe de Ventas</h3>

<div class="informe-container">

    <iframe
        src="https://app.powerbi.com/view?r=eyJrIjoiYmQwNDljYzEtY2EwMS00YWU1LWIyYzctODBiZGMxMmE2YWE5IiwidCI6Ijg3ZTNmYWVmLTg5YWItNGYzMC05OTU3LTU2YjVmOTBhYWQwOCJ9"></iframe>
    <button onclick="toggleZoom()" class="btn btn-dark btn-sm btn-full">⛶</button>

</div>

<div class="logos-fijos" id="logos-content">
    <p>Cargando logos...</p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/informe/ventas')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                const logosDiv = document.getElementById('logos-content');
                logosDiv.innerHTML = '';
                data.logos.forEach(url => {
                    logosDiv.innerHTML += `
                        <div class="logo-card">
                            <img src="${url}">
                        </div>
                    `;
                });
            } else {
                console.error('Error al cargar logos:', data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
        });
});
</script>
{% endblock %}
