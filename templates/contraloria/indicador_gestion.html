{% extends "base.html" %}

{% block title %}{{ data.titulo }}{% endblock %}

{% block content %}

<div class="container-fluid mt-4">
    <div class="saludo-container">
        <h1>{{ data.saludo }}, {{ data.nombre_usuario }}</h1>
    </div>

<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card-custom">
                <p>Contenido para: {{ data.titulo }}</p>

            </div>
        </div>
    </div>
</div>

<div class="logos-fijos" id="logos-fijos">
    <div id="logos-content">
        {% if data.logos %}
            {% for logo in data.logos %}
            <a href="/empresa/{{ logo.nombre }}" class="logo-card">
                <img src="{{ logo.url if logo.url is defined else logo }}" alt="logo {{ logo.nombre }}">
            </a>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
