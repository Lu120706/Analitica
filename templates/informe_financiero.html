{% extends "base.html" %}

{% block title %}Ventas{% endblock %}

{% block content %}

<h3 class="text-center">Informe Financiero</h3>

<div class="informe-container">

    <iframe
        src="https://app.powerbi.com/view?r=eyJrIjoiYmQwNDljYzEtY2EwMS00YWU1LWIyYzctODBiZGMxMmE2YWE5IiwidCI6Ijg3ZTNmYWVmLTg5YWItNGYzMC05OTU3LTU2YjVmOTBhYWQwOCJ9"></iframe>
    <button onclick="toggleZoom()" class="btn btn-dark btn-sm btn-full">⛶</button>
</div>

<div class="logos-fijos">
    {% for url in logos or [] %}
    <div class="logo-card {% if loop.index == 2 or loop.length == 1 %}logo-grande{% endif %}">
        <img src="{{ url }}">
    </div>
    {% endfor %}
</div>

{% endblock %}
