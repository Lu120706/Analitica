<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Abastecimiento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/abastecimiento.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="{{ url_for('dashboard', usuario=usuario, empresa=empresa) }}">
            {{ empresa | upper }}
        </a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('abastecimiento', seccion='campanas') }}">Campañas</a>
            <a class="nav-link" href="{{ url_for('abastecimiento', seccion='clientes') }}">Clientes</a>
            <a class="nav-link" href="{{ url_for('abastecimiento', seccion='ventas') }}">Ventas</a>
        </div>

    </div>
</nav>

<div class="container-fluid mt-4">

    <div class="saludo-container">
        <h1>{{ saludo }}, {{ usuario }}</h1>
    </div>

    <div class="contenido">

        {% set data = noticias_abastecimiento.get("abastecimiento", []) %}

        {% for n in data %}

            <div class="card-custom mb-3">

                {% if loop.first %}
                    <h4>Noticias</h4>
                    <hr>
                {% endif %}

                <h5>{{ n.titulo }}</h5>
                <p>{{ n.texto }}</p>

            </div>

        {% endfor %}

    </div>

</div>

</div>

<div class="logos-fijos">
    {% for url in logos or [] %}
        <div class="logo-card {% if loop.index == 2 %}logo-grande{% endif %}">
            <img src="{{ url }}">
        </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
