{% extends 'base.html' %}

{% block title %}Abastecimiento{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/abastecimiento.css') }}">
{% endblock %}

{% block nav_links %}
<a class="nav-link" href="#">Campañas</a>
<a class="nav-link" href="#">Clientes</a>
<a class="nav-link" href="#">Ventas</a>
{% endblock %}

{% block content %}

<div class="saludo-container">
    <h1 id="saludo">Cargando...</h1>
</div>

<div class="contenido" id="noticias-content">
    <p>Cargando noticias...</p>
</div>

<div class="logos-fijos" id="logos-content">
    <p>Cargando logos...</p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/abastecimiento')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('saludo').textContent = data.saludo + ', ' + data.usuario;

                const noticiasDiv = document.getElementById('noticias-content');
                if (data.noticias.length > 0) {
                    noticiasDiv.innerHTML = '<h4>Noticias</h4><hr>';
                    data.noticias.forEach(noticia => {
                        noticiasDiv.innerHTML += `
                            <div class="card-custom card-noticias mb-3">
                                <h5>${noticia.titulo}</h5>
                                <p>${noticia.texto}</p>
                            </div>
                        `;
                    });
                } else {
                    noticiasDiv.innerHTML = '<p>No hay noticias disponibles.</p>';
                }

                const logosDiv = document.getElementById('logos-content');
                logosDiv.innerHTML = '';
                data.logos.forEach(url => {
                    logosDiv.innerHTML += `
                        <div class="logo-card">
                            <img src="${url}">
                        </div>
                    `;
                });
            } else {
                alert('Error al cargar datos: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error al conectar con la API');
        });
});
</script>
{% endblock %}
