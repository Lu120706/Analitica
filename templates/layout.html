<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Mi sistema{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            font-family: "Times New Roman", Times, serif !important;
        }

        body {
            background:
                linear-gradient(rgba(20,30,60,0.15), rgba(60, 40, 20, 0.2)),
                url("https://i.postimg.cc/zBq4wWCg/Gemini-Generated-Image-estpntestpntestp.png");

            background-size: cover;
            background-attachment: fixed;
        }

        .navbar-custom {
            background-color: #F2E124 !important;
        }

        .navbar-brand {
            color: #000 !important;
            font-weight: bold;
        }

        .nav-link {
            color: #000 !important;
            margin-right: 10px;
        }

        .contenido-principal {
            margin-top: 25px;
        }
    </style>
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <a class="navbar-brand"
           href="{{ url_for('dashboard') }}">
            {{ empresa | default('SISTEMA') | upper }}
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="{{ url_for('dashboard') }}">
                Dashboard
            </a>

            <a class="nav-link" href="{{ url_for('informes') }}">
                Informes
            </a>

        </div>

    </div>
</nav>

<div class="container contenido-principal">

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
