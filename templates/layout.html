<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{% block title %}Sistema{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/informes.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="/dashboard?usuario={{usuario}}&empresa={{empresa}}">
            {{ empresa | upper }}
        </a>

        <div class="navbar-nav me-4">
            <a class="nav-link" href="{{ url_for('contabilidad') }}">Contabilidad</a>
            <a class="nav-link" href="{{ url_for('contraloria') }}">Contraloría</a>
            <a class="nav-link" href="{{ url_for('abastecimiento') }}">Abastecimiento</a>
            <a class="nav-link" href="{{ url_for('comercio') }}">Comercio</a>
            <a class="nav-link" href="{{ url_for('tesoreria') }}">Tesorería</a>
            <a class="nav-link" href="{{ url_for('indicadores') }}">Indicadores</a>
            <a class="nav-link" href="{{ url_for('tic') }}">TIC</a>
        </div>

    </div>
</nav>

<div class="container mt-3">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/informes.js') }}"></script>

</body>
</html>
