<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{% block title %}Sistema{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        * {
            font-family: "Times New Roman", Times, serif !important;
        }

        body {
            background:
                linear-gradient(rgba(20,30,60,0.15), rgba(60, 40, 20, 0.2)),
                url("https://i.postimg.cc/zBq4wWCg/Gemini-Generated-Image-estpntestpntestp.png");
            background-size: cover;
            background-attachment: fixed;
        }

        .informe-container {
            position: relative;
            width: 60%; 
            height: 710px; 
            margin: auto;
            padding: 20px;
            background: rgba(255,255,255,0.55);
        }

        .informe-container iframe {
            width: 700px;   
            height: 670px;
            display: block;
            margin: auto;  
        }

        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 9999;
            background: white;  
            padding: 0 !important;
            margin: 0 !important;
            border-radius: 0;
        }

        .fullscreen iframe {
            width: 100%;
            height: 100%;
        }

        body.fullscreen-active .navbar {
            display: none;
        }

        .btn-full {
            position: absolute;
            bottom: 10px;   
            right: 10px;  
            z-index: 10;
        }

        .navbar-custom {
            background-color: #F2E124 !important;
        }

        .navbar-brand {
            color: #000 !important;
            font-weight: bold;
        }

        .logos-fijos {
            position: fixed;
            top: 150px;
            right: 1cm;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2000;
        }

        .logo-card {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.244);
            border-left: 0px solid #91919198;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-card img {
            max-width: 110%;
            max-height: 110%;
            object-fit: contain;
        }

        .logo-grande img {
            transform: scale(1.14);
        }


    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <!-- NOMBRE EMPRESA -->
        <a class="navbar-brand fw-bold"
           href="/dashboard?usuario={{usuario}}&empresa={{empresa}}">
            {{ empresa | upper }}
        </a>

        <!-- MENÚ SUPERIOR -->
        <div class="navbar-nav me-4">
            <a class="nav-link" href="{{ url_for('contabilidad') }}">Contabilidad</a>
            <a class="nav-link" href="{{ url_for('contraloria') }}">Contraloría</a>
            <a class="nav-link" href="{{ url_for('abastecimiento') }}">Abastecimiento</a>
            <a class="nav-link" href="{{ url_for('comercio') }}">Comercio</a>
            <a class="nav-link" href="{{ url_for('tesoreria') }}">Tesorería</a>
            <a class="nav-link" href="{{ url_for('indicadores') }}">Indicadores</a>
            <a class="nav-link" href="{{ url_for('tic') }}">TIC</a>
        </div>

    </div>
</nav>

<div class="container mt-3">
    {% block content %}{% endblock %}
</div>

<script>
function toggleZoom() {
    const cont = document.querySelector(".informe-container");
    cont.classList.toggle("fullscreen");
    document.body.classList.toggle("fullscreen-active");
}
</script>

</body>
</html>
