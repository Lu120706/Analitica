<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Comercio Exterior</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/comercio.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <div class="container-fluid">

            <a class="navbar-brand" href="{{ url_for('dashboard', usuario=usuario, empresa=empresa) }}">
                {{ empresa | upper }}
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Campañas</a>
                <a class="nav-link" href="#">Clientes</a>
                <a class="nav-link" href="#">Ventas</a>
            </div>

        </div>
    </nav>

    <div class="container-fluid mt-4">

        <div class="saludo-container">
            <h1>{{ saludo }}, {{ usuario }}</h1>
        </div>

        <div class="contenido-izquierda">

            {% for n in noticias_comercio %}
            <div class="card-custom">
                {% if loop.first %}
                <h5>Noticias</h5>
                <hr>
                {% endif %}
                <strong>{{ n.titulo }}</strong>
                <p>{{ n.texto }}</p>

            </div>

            {% endfor %}

        </div>


    </div>

    <div class="logos-fijos">
        {% for url in logos or [] %}
        <div class="logo-card {% if loop.index == 2 %}logo-grande{% endif %}">
            <img src="{{ url }}">
        </div>
        {% endfor %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
