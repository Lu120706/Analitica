<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comercio Exterior</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                linear-gradient(rgba(20,30,60,0.15), rgba(60, 40, 20, 0.2)),
                url("https://i.postimg.cc/zBq4wWCg/Gemini-Generated-Image-estpntestpntestp.png");
            background-size: cover;
            background-attachment: fixed;
        }

        * {
            font-family: "Times New Roman", Times, serif !important;
        }

        .navbar-custom {
            background-color: #F2E124 !important;
        }

        .navbar-custom .nav-link,
        .navbar-custom .navbar-brand {
            color: #000 !important;
        }

        .saludo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .saludo-container h1 {
            font-size: 2.3rem;
            font-weight: bold;
            color: #000;
        }

        .contenido {
            margin-left: 40px;
            margin-right: auto;
            max-width: 700px;
            
        }

        .card-custom {
            background: rgba(255,255,255,0.45);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        .card-custom h5 {
            font-size: 18px;
        }

        .card-custom p {
            color: #000;
            font-size: 18px;
        }

        .logos-fijos {
            position: fixed;
            top: 150px;
            right: 1cm;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2000;
        }

        .logo-card {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.244);
            border-left: 0px solid #91919198;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-card img {
            max-width: 110%;
            max-height: 110%;
            object-fit: contain;
        }

        .logo-grande img {
            transform: scale(1.14);
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('dashboard', usuario=usuario, empresa=empresa) }}">
            {{ empresa | upper }}
        </a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Campañas</a>
            <a class="nav-link" href="#">Clientes</a>
            <a class="nav-link" href="#">Ventas</a>
        </div>

    </div>
</nav>

<div class="container-fluid mt-4">

    <div class="saludo-container">
        <h1>{{ saludo }}, {{ usuario }}</h1>
    </div>

    <div class="contenido">

        <div class="card-custom">
            <h5>Noticias</h5>
            <hr>
            <h5>Campañas</h5>
            <p>Seguimiento a campañas activas y resultados.</p>
            
            
        </div>

        <div class="card-custom">
            <h5>Clientes</h5>
            <p>Segmentación y comportamiento de clientes.</p>
        </div>

        <div class="card-custom">
            <h5>Ventas</h5>
            <p>Análisis de desempeño comercial.</p>
        </div>

    </div>

</div>

<div class="logos-fijos">
    {% for url in logos or [] %}
        <div class="logo-card {% if loop.index == 2 %}logo-grande{% endif %}">
            <img src="{{ url }}">
        </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
