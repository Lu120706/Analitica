<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comercio Exterior</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/comercio.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('dashboard', usuario=usuario, empresa=empresa) }}">
            {{ empresa | upper }}
        </a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Campañas</a>
            <a class="nav-link" href="#">Clientes</a>
            <a class="nav-link" href="#">Ventas</a>
        </div>

    </div>
</nav>

<div class="container-fluid mt-4">

    <div class="saludo-container">
        <h1>{{ saludo }}, {{ usuario }}</h1>
    </div>

    <div class="contenido">

        <div class="card-custom">
            <h5>Noticias</h5>
            <hr>
            <h5>Campañas</h5>
            <p>Seguimiento a campañas activas y resultados.</p>
            
            
        </div>

        <div class="card-custom">
            <h5>Clientes</h5>
            <p>Segmentación y comportamiento de clientes.</p>
        </div>

        <div class="card-custom">
            <h5>Ventas</h5>
            <p>Análisis de desempeño comercial.</p>
        </div>

    </div>

</div>

<div class="logos-fijos">
    {% for url in logos or [] %}
        <div class="logo-card {% if loop.index == 2 %}logo-grande{% endif %}">
            <img src="{{ url }}">
        </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
