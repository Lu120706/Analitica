{% extends "base.html" %}

{% block title %}Contabilidad{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/contabilidad.css') }}">
{% endblock %}

{% block nav_links %}
<a class="nav-link" href="#">Auditoría</a>
<a class="nav-link" href="#">Revisión Fiscal</a>
{% endblock %}

{% block content %}

<div class="saludo-container">
    <h1 id="saludo">Cargando...</h1>
</div>

<div class="row" id="noticias-row">
    <p>Cargando noticias...</p>
</div>

<div class="logos-fijos" id="logos-content">
    <p>Cargando logos...</p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/contabilidad')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('saludo').textContent = data.saludo + ', ' + data.usuario;

                const noticiasRow = document.getElementById('noticias-row');
                if (data.noticias.length > 0) {
                    noticiasRow.innerHTML = '';
                    data.noticias.forEach(noticia => {
                        noticiasRow.innerHTML += `
                            <div class="col-12">
                                <div class="card-custom card-noticias mb-3">
                                    <strong>${noticia.titulo}</strong><br>
                                    ${noticia.texto}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    noticiasRow.innerHTML = '<p>No hay noticias disponibles.</p>';
                }

                const logosDiv = document.getElementById('logos-content');
                logosDiv.innerHTML = '';
                data.logos.forEach(url => {
                    logosDiv.innerHTML += `
                        <div class="logo-card">
                            <img src="${url}">
                        </div>
                    `;
                });
            } else {
                alert('Error al cargar datos: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error al conectar con la API');
        });
});
</script>
{% endblock %}
