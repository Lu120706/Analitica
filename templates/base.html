<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALITICS - ERP Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #111827;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: block;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #fff;
        }

        .topbar {
            height: 60px;
            background: #0b1220;
            margin-left: 240px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #1f2937;
        }

        .topbar .search input {
            background: #111827;
            border: 1px solid #374151;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .topbar .user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>ANALITICS ERP</h3>

    <a href="/dashboard">Dashboard</a>
    <a href="/contraloria">Contraloría</a>
    <a href="/comercio">Comercio</a>
    <a href="/abastecimiento">Abastecimiento</a>
    <a href="/cartera">Cartera</a>
    <a href="/contabilidad">Contabilidad</a>
</div>

<div class="topbar">

    <div class="search">
        <input type="text" placeholder="Buscar módulos...">
    </div>

    <div class="user">

        <span>{{ usuario }}</span>
        <a href="/logout" class="btn btn-sm btn-danger">Salir</a>

    </div>

</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
