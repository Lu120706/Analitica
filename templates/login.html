<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistema ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-box text-center">

        <h2>Iniciar Sesión</h2>

        {# Manejo de errores nativo de Flask #}
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger text-start">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {# Formulario directo a la ruta de Flask #}
        <form action="{{ url_for('login') }}" method="POST">

            <div class="mb-3 text-start">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="usuario" placeholder="Ingrese usuario" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" placeholder="Ingrese contraseña" required>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold">
                Entrar
            </button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {# SCRIPT ELIMINADO #}

</body>
</html>
