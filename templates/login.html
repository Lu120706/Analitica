<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-box text-center">

        <h2>Iniciar Sesión</h2>

        <div id="error-message" class="alert alert-danger text-start d-none">
        </div>

        <form id="login-form">

            <div class="mb-3 text-start">
                <label class="form-label">Usuario</label>

                <input type="text" class="form-control" name="usuario" placeholder="Ingrese usuario" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Contraseña</label>

                <input type="password" class="form-control" name="password" placeholder="Ingrese contraseña" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                Entrar
            </button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const data = {
            usuario: formData.get('usuario'),
            password: formData.get('password')
        };

        fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') {
                window.location.href = result.redirect;
            } else {
                document.getElementById('error-message').textContent = result.message;
                document.getElementById('error-message').classList.remove('d-none');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('error-message').textContent = 'Error de conexión';
            document.getElementById('error-message').classList.remove('d-none');
        });
    });
    </script>

</body>

</html>
