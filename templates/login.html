<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(20,30,60,0.15), rgba(60, 40, 20, 0.2)),
                url("https://i.postimg.cc/zBq4wWCg/Gemini-Generated-Image-estpntestpntestp.png");

            background-size: cover;
            background-attachment: fixed;
        }

        * {
            font-family: "Times New Roman", Times, serif !important;
        }

        h2, label, button {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .login-box {
            background: rgba(0,0,0,0.8);
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            margin-bottom: 25px;
        }

        .form-control {
            background-color: #111;
            color: white;
            border: 1px solid #444;
        }

        .form-control:focus {
            background-color: #111;
            color: white;
            border-color: #F2E124;
            box-shadow: none;
        }

        .btn-warning {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box text-center">
    <h2>Iniciar Sesión</h2>

    {% if error %}
        <div class="alert alert-danger text-start">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3 text-start">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" name="usuario" placeholder="Ingrese usuario" required>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" placeholder="Ingrese contraseña" required>
        </div>

        <button type="submit" class="btn btn-warning w-100">Entrar</button>
    </form>
</div>

</body>
</html>
