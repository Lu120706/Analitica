{% extends "base.html" %}

{% block title %}Tesorería{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/tesoreria.css') }}">
{% endblock %}

{% block nav_links %}
<a class="nav-link" href="#">Indicadores</a>
<a class="nav-link" href="#">Reportes</a>
{% endblock %}

{% block content %}

<div class="container-fluid mt-4">

    <div class="saludo-container">
        <h5 id="saludo">Cargando...</h5>
    </div>

    <div class="reporte-dropdown">
        <label for="reportes">Reportes</label>
        <select id="reportes" name="reportes">
            <option value="" disabled selected>Seleccione un reporte</option>
            <option value="cartera">Reportes de cartera</option>
            <option value="ibr">Reportes de IBR</option>
            <option value="ventas_gestion">Reportes de ventas de gestión</option>
            <option value="ventas_mostrador">Reportes de ventas de mostrador</option>
            <option value="eva">Reportes EVA</option>
            <option value="venta_perdida">Reportes de venta perdida</option>
            <option value="cumplimiento_presupuestal">Reportes de cumplimiento presupuestal</option>
        </select>
    </div>

    <div class="contenido-izquierda" id="noticias-content">
        <p>Cargando noticias...</p>
    </div>

</div>

<div class="logos-fijos" id="logos-content">
    <p>Cargando logos...</p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/tesoreria')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('saludo').textContent = data.saludo + ', ' + data.usuario;

                const noticiasDiv = document.getElementById('noticias-content');
                if (data.noticias.length > 0) {
                    noticiasDiv.innerHTML = '<h5>Noticias</h5><hr>';
                    data.noticias.forEach(noticia => {
                        noticiasDiv.innerHTML += `
                            <div class="card-custom card-noticias">
                                <strong>${noticia.titulo}</strong>
                                <p>${noticia.texto}</p>
                            </div>
                        `;
                    });
                } else {
                    noticiasDiv.innerHTML = '<p>No hay noticias disponibles.</p>';
                }

                const logosDiv = document.getElementById('logos-content');
                logosDiv.innerHTML = '';
                data.logos.forEach(url => {
                    logosDiv.innerHTML += `
                        <div class="logo-card">
                            <img src="${url}">
                        </div>
                    `;
                });
            } else {
                alert('Error al cargar datos: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error al conectar con la API');
        });
});
</script>
{% endblock %}
