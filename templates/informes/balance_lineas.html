{% extends "base.html" %}

{% block title %}Balance de Líneas{% endblock %}

{% block content %}

<h3 class="text-center">{{ data.titulo if data.titulo else 'Balance de Líneas' }}</h3>

<div class="informe-container">
    <iframe
        src="https://app.powerbi.com/view?r=eyJrIjoiYmQwNDljYzEtY2EwMS00YWU1LWIyYzctODBiZGMxMmE2YWE5IiwidCI6Ijg3ZTNmYWVmLTg5YWItNGYzMC05OTU3LTU2YjVmOTBhYWQwOCJ9"
        allowFullScreen="true">
    </iframe>
    <button onclick="toggleZoom()" class="btn btn-dark btn-sm btn-full">⛶</button>
</div>

<div class="logos-fijos">
    {% if data.logos %}
        {% for logo in data.logos %}
            <div class="logo-card">
                <img src="{{ logo.url if logo.url else logo }}" alt="logo empresa">
            </div>
        {% endfor %}
    {% endif %}
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/informes.js') }}"></script>
{% endblock %}
