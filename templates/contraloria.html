<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Contraloría</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/contraloria.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom px-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard?usuario={{usuario}}&empresa={{empresa}}">
                {{ empresa | upper }}
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/contraloria?usuario={{usuario}}&empresa={{empresa}}&seccion=indicadores">
                    Indicadores
                </a>

                <a class="nav-link" href="/contraloria?usuario={{usuario}}&empresa={{empresa}}&seccion=reportes">
                    Reportes
                </a>
            </div>

        </div>
    </nav>

    <div class="container-fluid mt-4">

        <div class="saludo-container">
            <h5>{{ saludo }}, {{ usuario }}</h5>
        </div>

        <div class="row">

            <div class="col-md-8">

                <div class="contenido-izquierda">
                    {% for n in noticias_contraloria %}
                    <div class="card-custom mb-3">

                        {% if loop.first %}
                        <h5>Noticias</h5>
                        <hr>
                        {% endif %}

                        <strong>{{ n.titulo }}</strong><br>
                        {{ n.texto }}
                    </div>
                    {% endfor %}
                </div>

            </div>

        </div>

    </div>

    <div class="logos-fijos">
        {% for url in logos or [] %}
        <div class="logo-card {% if loop.index == 2 %}logo-grande img{% endif %}">
            <img src="{{ url }}">
        </div>
        {% endfor %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
