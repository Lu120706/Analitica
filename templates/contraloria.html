{% extends "base.html" %}

{% block title %}Contraloría{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/contraloria.css') }}">
{% endblock %}

{% block nav_links %}
<a class="nav-link" href="/contraloria?seccion=indicadores">Indicadores</a>
<a class="nav-link" href="/contraloria?seccion=reportes">Reportes</a>
{% endblock %}

{% block content %}

<div class="container-fluid mt-4">

    <div class="saludo-container">
        <h5 id="saludo">Cargando...</h5>
    </div>

    <div class="row">

        <div class="col-md-8">

            <div class="contenido-izquierda" id="noticias-content">
                <p>Cargando noticias...</p>
            </div>

        </div>

    </div>

</div>

<div class="logos-fijos" id="logos-content">
    <p>Cargando logos...</p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/contraloria')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('saludo').textContent = data.saludo + ', ' + data.usuario;

                const noticiasDiv = document.getElementById('noticias-content');
                if (data.noticias.length > 0) {
                    noticiasDiv.innerHTML = '<h5>Noticias</h5><hr>';
                    data.noticias.forEach(noticia => {
                        noticiasDiv.innerHTML += `
                            <div class="card-custom card-noticias mb-3">
                                <strong>${noticia.titulo}</strong><br>
                                ${noticia.texto}
                            </div>
                        `;
                    });
                } else {
                    noticiasDiv.innerHTML = '<p>No hay noticias disponibles.</p>';
                }

                const logosDiv = document.getElementById('logos-content');
                logosDiv.innerHTML = '';
                data.logos.forEach(url => {
                    logosDiv.innerHTML += `
                        <div class="logo-card">
                            <img src="${url}">
                        </div>
                    `;
                });
            } else {
                alert('Error al cargar datos: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error al conectar con la API');
        });
});
</script>
{% endblock %}
